galaxy_info:
  author: gkorkmaz
  description: Install and configure Gitea self-hosted Git service

  documented_requirements:
    - name: community.docker
      version: 4.8.1
    - name: community.general
      version: 6.6.1
    - name: ansible.posix
      version: 1.5.4
    - src: https://github.com/ginanck/role_base.git
      version: master

  namespace: core
  role_name: role_nginx

  license: MIT
  min_ansible_version: "2.11"

  platforms:
    - name: Ubuntu
      versions:
        - jammy     # 22.04
        - noble     # 24.04
    - name: Debian
      versions:
        - bullseye  # 11
        - bookworm  # 12
    - name: AlmaLinux
      versions:
        - "9"
        - "10"
    - name: RockyLinux
      versions:
        - "10"

  galaxy_tags:
    - nginx
    - git
    - scm
    - devops

dependencies: []

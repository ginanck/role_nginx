---

- name: Create HTTP configuration directories
  ansible.builtin.include_tasks: create-dirs-config.yml
  vars:
    directory_type: "static configuration directory"
  loop:
    - "stream.d"

- name: Create HTTP SSL directories
  ansible.builtin.include_tasks: create-dirs-ssl.yml
  vars:
    directory_type: "ssl directory"
  loop:
    - "static"

- name: Create tcp load balancer configurations
  ansible.builtin.template:
    src: config/stream.conf.j2
    dest: "{{ nginx_service_config_path }}/stream.d/stream_{{ item.name }}.conf"
    mode: '0644'
    owner: root
    group: root
  loop: "{{ nginx_stream_loadbalancers | selectattr('enabled', 'equalto', true) }}"
  loop_control:
    label: "{{ item.name }}"
  notify: reload nginx

---

- name: Stop and disable firewalld service
  ansible.builtin.systemd:
    name: firewalld
    state: stopped
    enabled: false
  failed_when: false
  when: ansible_os_family == 'RedHat'

- name: Stop and disable ufw service
  ansible.builtin.systemd:
    name: ufw
    state: stopped
    enabled: false
  failed_when: false
  when: ansible_os_family == 'Debian'

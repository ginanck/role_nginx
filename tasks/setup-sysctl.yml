---

- name: ensure sysctl.d directory exists
  ansible.builtin.file:
    path: /etc/sysctl.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: create sysctl configuration file for Nginx
  ansible.builtin.template:
    src: config/sysctl.conf.j2
    dest: "/etc/sysctl.d/{{ nginx_sysctl_conf_file }}"
    owner: root
    group: root
    mode: '0644'
  register: sysctl_config

- name: apply sysctl parameters
  ansible.builtin.command: "sysctl -p /etc/sysctl.d/{{ nginx_sysctl_conf_file }}"
  when: sysctl_config.changed

---

- name: Create HTTP configuration directories
  ansible.builtin.include_tasks: create-dirs-config.yml
  vars:
    directory_type: "static configuration directory"
  loop:
    - "vhost.d"

- name: Create HTTP configuration directories
  ansible.builtin.include_tasks: create-dirs-root.yml
  vars:
    directory_type: "static file directory"
  loop:
    - "vhost"

- name: Create HTTP SSL directories
  ansible.builtin.include_tasks: create-dirs-ssl.yml
  vars:
    directory_type: "ssl directory"
  loop:
    - "http"

- name: Create vhost configurations
  ansible.builtin.template:
    src: config/vhost.conf.j2
    dest: "{{ nginx_service_config_path }}/vhost.d/vhost_{{ item.name }}.conf"
    mode: '0644'
    owner: root
    group: root
  loop: "{{ nginx_vhost_servers | selectattr('enabled', 'equalto', true) }}"
  loop_control:
    label: "{{ item.name }}"
  notify: reload nginx
